<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@sonet — Dashboard Asesor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --sb: #f4f7fe;
            --sb2: #ffffff;
            --sb3: #ffffff;
            --surf: #f8fafc;
            --b: #1a56db;
            --bd: #1044bb;
            --or: #f04e00;
            --t: #1e293b;
            --t2: #475569;
            --t3: #64748b;
            --bdr: rgba(0, 0, 0, 0.08);
            --gs: #dcfce7;
            --gst: #166534;
            --is: #dbeafe;
            --ist: #1e40af;
            --sidebar-w: 220px;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--sb);
            color: var(--t);
            min-height: 100vh;
            overflow-x: hidden
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--sb2);
            border-right: 1px solid var(--bdr);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 200;
            transition: transform .28s ease
        }

        .logo {
            padding: 10px 10px 10px;
            border-bottom: 1px solid var(--bdr);
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .logo img {
            max-width: 100%;
            height: auto;
            max-height: 80px;
            object-fit: contain;
        }

        .logo span {
            color: var(--or)
        }

        .user-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 18px;
            border-bottom: 1px solid var(--bdr)
        }

        .av {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a56db, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            color: #fff;
            flex-shrink: 0;
            font-family: 'Syne', sans-serif
        }

        .u-name {
            font-size: 13px;
            font-weight: 700
        }

        .u-role {
            font-size: 11px;
            color: var(--t3);
            margin-top: 2px
        }

        .online {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: var(--gst);
            margin-top: 3px
        }

        .dot-g {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #22c55e
        }

        nav {
            flex: 1;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 1px;
            overflow-y: auto
        }

        .ni {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 11px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--t3);
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: .15s
        }

        .ni:hover {
            background: var(--sb3);
            color: var(--t)
        }

        .ni.act {
            background: rgba(26, 86, 219, .10);
            color: var(--b)
        }

        .ni i {
            font-size: 17px;
            width: 20px;
            text-align: center;
            flex-shrink: 0
        }

        .nbadge {
            margin-left: auto;
            font-size: 10px;
            font-weight: 700;
            background: var(--or);
            color: #fff;
            padding: 2px 6px;
            border-radius: 100px
        }

        .sb-bot {
            padding: 10px;
            border-top: 1px solid var(--bdr)
        }

        /* ── OVERLAY MOBILE ── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .55);
            z-index: 199
        }

        .overlay.show {
            display: block
        }

        /* ── MAIN ── */
        .main {
            margin-left: var(--sidebar-w);
            display: flex;
            flex-direction: column;
            min-height: 100vh
        }

        /* ── TOPBAR ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 30px;
            background: var(--sb2);
            border-bottom: 1px solid var(--bdr);
            position: sticky;
            top: 0;
            z-index: 100
        }

        .tb-l {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .hamburger {
            display: none;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            background: var(--sb3);
            border: 1px solid var(--bdr);
            border-radius: 8px;
            cursor: pointer;
            color: var(--t2)
        }

        .hamburger i {
            font-size: 18px
        }

        .tb-title {
            font-family: 'Outfit', sans-serif;
            font-size: 30px;
            font-weight: 800
        }

        .tb-sub {
            font-size: 15px;
            color: var(--t3);
            margin-top: 2px
        }

        .tb-r {
            display: flex;
            align-items: center;
            gap: 8px
        }

        .ib {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: var(--sb3);
            border: 1px solid var(--bdr);
            color: var(--t2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: .15s
        }

        .ib:hover {
            background: var(--surf);
            color: var(--t)
        }

        .ib i {
            font-size: 16px
        }

        .nb {
            position: absolute;
            top: 7px;
            right: 7px;
            width: 6px;
            height: 6px;
            background: var(--or);
            border-radius: 50%;
            border: 2px solid var(--sb2)
        }

        /* ── CONTENT ── */
        .content {
            padding: 24px 28px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px
        }

        /* ── KPIs ── */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px
        }

        .kpi {
            background: var(--sb3);
            border: 1px solid var(--bdr);
            border-radius: 14px;
            padding: 18px 18px 14px;
            overflow: hidden
        }

        .kpi-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px
        }

        .kpi-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .kpi-icon i {
            font-size: 17px
        }

        .ki-b {
            background: var(--is);
            color: var(--ist)
        }

        .ki-g {
            background: var(--gs);
            color: var(--gst)
        }

        .ki-a {
            background: #fef3c7;
            color: #d97706
        }

        .kpi-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 100px
        }

        .kb-flat {
            background: var(--is);
            color: var(--ist)
        }

        .kb-up {
            background: var(--gs);
            color: var(--gst)
        }

        .kpi-num {
            font-family: 'Syne', sans-serif;
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 4px
        }

        .kpi-lbl {
            font-size: 12px;
            color: var(--t3)
        }

        .kpi-spark {
            margin-top: 12px;
            height: 36px;
            opacity: .7;
            display: block;
            width: 100%
        }

        /* ── TABLE CARD ── */
        .tbl-card {
            background: var(--sb3);
            border: 1px solid var(--bdr);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            animation: fadeUp .35s .08s ease both
        }

        .tbl-hd {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--bdr);
            gap: 12px;
            flex-wrap: wrap
        }

        .tbl-title {
            font-size: 14px;
            font-weight: 700
        }

        .tbl-ctrl {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap
        }

        .s-wrap {
            position: relative
        }

        .s-wrap i {
            position: absolute;
            left: 9px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--t3);
            pointer-events: none
        }

        .s-inp {
            background: var(--sb2);
            border: 1px solid var(--bdr);
            border-radius: 8px;
            padding: 7px 10px 7px 30px;
            color: var(--t);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            width: 190px;
            transition: .15s
        }

        .s-inp:focus {
            border-color: var(--b)
        }

        .s-inp::placeholder {
            color: var(--t3)
        }

        .btn-p {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--b);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 7px 14px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: .15s
        }

        .btn-p:hover {
            background: var(--bd)
        }

        .btn-p i {
            font-size: 14px
        }

        .tbl-wrap {
            overflow-x: auto
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 520px
        }

        thead th {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .6px;
            color: var(--t3);
            padding: 10px 18px;
            text-align: left;
            background: var(--surf);
            border-bottom: 1px solid var(--bdr);
            white-space: nowrap
        }

        tbody td {
            padding: 12px 18px;
            font-size: 13px;
            color: var(--t);
            border-bottom: 1px solid var(--bdr);
            vertical-align: middle
        }

        tbody tr:last-child td {
            border-bottom: none
        }

        tbody tr:hover td {
            background: var(--surf)
        }

        .c-cell {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .c-av {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: var(--ist);
            background: var(--is);
            flex-shrink: 0
        }

        .c-name {
            font-size: 13px;
            font-weight: 600
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 6px
        }

        .btn-dl {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--sb2);
            border: 1px solid var(--bdr);
            border-radius: 7px;
            padding: 5px 10px;
            font-family: inherit;
            font-size: 11px;
            font-weight: 600;
            color: var(--t2);
            cursor: pointer;
            transition: .15s
        }

        .btn-dl:hover {
            background: var(--b);
            border-color: var(--b);
            color: #fff
        }

        .btn-dl:disabled {
            opacity: .35;
            cursor: not-allowed
        }

        .btn-dl i {
            font-size: 13px
        }

        .btn-eye {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--sb2);
            border: 1px solid var(--bdr);
            border-radius: 7px;
            cursor: pointer;
            color: var(--t3);
            transition: .15s;
            font-size: 13px
        }

        .btn-eye:hover {
            background: var(--surf);
            color: var(--t)
        }

        /* empty state */
        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 48px 20px;
            color: var(--t3);
            gap: 10px
        }

        .empty-state i {
            font-size: 40px;
            opacity: .4
        }

        .empty-state p {
            font-size: 14px
        }

        /* pagination */
        .pag {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-top: 1px solid var(--bdr);
            flex-wrap: wrap;
            gap: 10px
        }

        .pag-info {
            font-size: 12px;
            color: var(--t3)
        }

        .pag-btns {
            display: flex;
            gap: 5px
        }

        .pb {
            background: var(--sb2);
            border: 1px solid var(--bdr);
            border-radius: 7px;
            padding: 5px 10px;
            font-family: inherit;
            font-size: 12px;
            color: var(--t2);
            cursor: pointer;
            transition: .15s
        }

        .pb:hover:not(:disabled) {
            background: var(--surf);
            color: var(--t)
        }

        .pb.cur {
            background: var(--b);
            border-color: var(--b);
            color: #fff
        }

        .pb:disabled {
            opacity: .35;
            cursor: not-allowed
        }

        /* mobile bottom nav */
        .mobile-nav {
            display: none
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .kpi-row {
            animation: fadeUp .35s ease both
        }

        .tbl-card {
            animation: fadeUp .35s .08s ease both
        }

        /* ══════════════════════════════
   RESPONSIVE
══════════════════════════════ */
        @media(max-width:900px) {
            .sidebar {
                transform: translateX(-100%);
                box-shadow: 4px 0 40px rgba(0, 0, 0, .08)
            }

            .sidebar.open {
                transform: translateX(0)
            }

            .main {
                margin-left: 0
            }

            .hamburger {
                display: flex
            }

            .topbar {
                padding: 14px 18px
            }

            .content {
                padding: 18px 16px 90px
            }

            .kpi-row {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px
            }

            .kpi-num {
                font-size: 26px
            }

            .s-inp {
                width: 150px
            }

            .mobile-nav {
                display: flex;
                justify-content: space-around;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: var(--sb2);
                border-top: 1px solid var(--bdr);
                padding: 10px 0 20px;
                z-index: 150
            }

            .mnav-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 3px;
                font-size: 11px;
                font-weight: 600;
                color: var(--t3);
                cursor: pointer;
                border: none;
                background: none;
                text-decoration: none;
                transition: color .15s;
                padding: 0 10px
            }

            .mnav-item i {
                font-size: 22px
            }

            .mnav-item.act {
                color: var(--b)
            }
        }

        @media(max-width:540px) {
            .kpi-row {
                grid-template-columns: 1fr
            }

            .tbl-ctrl {
                width: 100%
            }

            .s-inp {
                width: 100%;
                flex: 1
            }

            .btn-p span {
                display: none
            }
        }
    </style>
</head>

<body>

    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="logo"><img src="logo-sonet-light.png" alt="Asonet Logo"></div>

        <div class="user-pill">
            <div class="av" id="sb-avatar">JP</div>
            <div>
                <div class="u-name" id="sb-name">Juan Pérez</div>
                <div class="u-role" id="sb-role">Asesor comercial</div>
            </div>
        </div>

        <nav>
            <button class="ni act">
                <i class="ti ti-layout-dashboard" aria-hidden="true"></i>Dashboard
            </button>
            <button class="ni" onclick="window.location.href='contrato.html'">
                <i class="ti ti-file-text" aria-hidden="true"></i>Contratos
                <span class="nbadge" id="sb-pending-badge">0</span>
            </button>
            <button class="ni" onclick="window.location.href='cliente.html'">
                <i class="ti ti-users" aria-hidden="true"></i>Clientes
            </button>
        </nav>

        <div class="sb-bot">
            <button class="mnav-item" onclick="window.location.href='contrato.html'">
            <i class="ti ti-file-text" aria-hidden="true"></i>
            <span>Contratos</span>
        </button>
            <button class="ni" onclick="logout()">
                <i class="ti ti-logout" aria-hidden="true"></i>Cerrar sesión
            </button>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="main">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="tb-l">
                <button class="hamburger" onclick="toggleSidebar()" aria-label="Menú">
                    <i class="ti ti-menu-2" aria-hidden="true"></i>
                </button>
                <div>
                    <div class="tb-title">Panel de control</div>
                    <div class="tb-sub" id="today-date"></div>
                </div>
            </div>
            <div class="tb-r">
                <div class="ib" id="topbar-avatar" title="Perfil" style="font-size:12px;font-weight:800;color:#1a56db;font-family:'Syne',sans-serif;">JP</div>
            </div>
        </header>

        <!-- CONTENT -->
        <main class="content">
            <!-- KPIs -->
            <div class="kpi-row">
                <div class="kpi">
                    <div class="kpi-top">
                        <div class="kpi-icon ki-b"><i class="ti ti-files" aria-hidden="true"></i></div>
                        <span class="kpi-badge kb-flat">Total</span>
                    </div>
                    <div class="kpi-num" id="stat-total">0</div>
                    <div class="kpi-lbl">Contratos totales</div>
                    <svg class="kpi-spark" viewBox="0 0 120 36" preserveAspectRatio="none" aria-hidden="true">
                        <polyline points="0,30 20,26 40,20 60,22 80,14 100,10 120,8" fill="none" stroke="#1a56db"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M0,30 20,26 40,20 60,22 80,14 100,10 120,8 120,36 0,36Z" fill="rgba(26,86,219,0.12)" />
                    </svg>
                </div>
                <div class="kpi">
                    <div class="kpi-top">
                        <div class="kpi-icon ki-g"><i class="ti ti-calendar-check" aria-hidden="true"></i></div>
                        <span class="kpi-badge kb-up">↑ Este mes</span>
                    </div>
                    <div class="kpi-num" id="stat-month">0</div>
                    <div class="kpi-lbl">Contratos este mes</div>
                    <svg class="kpi-spark" viewBox="0 0 120 36" preserveAspectRatio="none" aria-hidden="true">
                        <polyline points="0,32 30,28 60,20 90,16 120,8" fill="none" stroke="#22c55e" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M0,32 30,28 60,20 90,16 120,8 120,36 0,36Z" fill="rgba(34,197,94,0.10)" />
                    </svg>
                </div>
                <div class="kpi">
                    <div class="kpi-top">
                        <div class="kpi-icon ki-a"><i class="ti ti-file-check" aria-hidden="true"></i></div>
                        <span class="kpi-badge kb-flat">PDF</span>
                    </div>
                    <div class="kpi-num" id="stat-pdf">0</div>
                    <div class="kpi-lbl">Con PDF generado</div>
                    <svg class="kpi-spark" viewBox="0 0 120 36" preserveAspectRatio="none" aria-hidden="true">
                        <polyline points="0,28 20,24 40,22 60,18 80,18 100,14 120,12" fill="none" stroke="#f59e0b"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M0,28 20,24 40,22 60,18 80,18 100,14 120,12 120,36 0,36Z"
                            fill="rgba(245,158,11,0.10)" />
                    </svg>
                </div>
            </div>

            <!-- TABLE -->
            <div class="tbl-card">
                <div class="tbl-hd">
                    <div class="tbl-title">Contratos registrados</div>
                    <div class="tbl-ctrl">
                        <div class="s-wrap">
                            <i class="ti ti-search" aria-hidden="true"></i>
                            <input class="s-inp" type="text" id="search-input" placeholder="Buscar cliente o CC…"
                                oninput="filterTable()">
                        </div>
                        <button class="btn-p" onclick="nuevoContrato()">
                            <i class="ti ti-plus" aria-hidden="true"></i>
                            <span>Nuevo contrato</span>
                        </button>
                    </div>
                </div>

                <div class="tbl-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Cliente</th>
                                <th>CC / NIT</th>
                                <th>Servicio</th>
                                <th>Fecha</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="contracts-tbody"></tbody>
                    </table>
                    <div class="empty-state" id="empty-state">
                        <i class="ti ti-file-off" aria-hidden="true"></i>
                        <p>No se encontraron contratos</p>
                    </div>
                </div>

                <div class="pag">
                    <span class="pag-info" id="page-info"></span>
                    <div class="pag-btns" id="page-btns"></div>
                </div>
            </div>

        </main>
    </div>

    <!-- MOBILE BOTTOM NAV -->
    <nav class="mobile-nav">
        <a class="mnav-item act" href="dasboard.html"><i class="ti ti-layout-dashboard"></i>Inicio</a>
        <a class="mnav-item" href="contrato.html"><i class="ti ti-file-text"></i>Contratos</a>
        <a class="mnav-item" href="cliente.html"><i class="ti ti-users"></i>Clientes</a>
        <a class="mnav-item" href="#"><i class="ti ti-user"></i>Perfil</a>
    </nav>

    <script>
        /* ════════════════════════════════════════════════════
           CONFIGURACIÓN
        ════════════════════════════════════════════════════ */
        const API = {
            dashboard: '/api/dashboard',
            pdf: '/api/contratos/{id}/pdf',
            logout: '/api/logout',
            nuevo: 'contrato.html',
        };

        /* ════════════════════════════════════════════════════
           DATOS DEMO — se usan cuando no hay backend
        ════════════════════════════════════════════════════ */
        const DEMO_DATA = {
            contratos: [
                { id: '001', nombre: 'Carlos Medina', cc: '12.345.678', servicio: 'Internet + TV', fecha: '2025-05-15', pdf_listo: true },
                { id: '002', nombre: 'María Torres', cc: '98.765.432', servicio: 'Internet fijo', fecha: '2025-05-19', pdf_listo: true },
                { id: '003', nombre: 'Luis Gómez', cc: '45.123.900', servicio: 'Telefonía + Internet', fecha: '2025-05-20', pdf_listo: false },
                { id: '004', nombre: 'Ana Rodríguez', cc: '71.456.012', servicio: 'Internet fijo', fecha: '2025-05-21', pdf_listo: false },
                { id: '005', nombre: 'Ricardo Fuentes', cc: '10.234.567', servicio: 'Internet + TV', fecha: '2025-05-21', pdf_listo: false },
                { id: '006', nombre: 'Sandra Vargas', cc: '52.874.190', servicio: 'Telefonía fija', fecha: '2025-04-10', pdf_listo: true },
                { id: '007', nombre: 'Pedro Sánchez', cc: '80.341.229', servicio: 'Internet fijo', fecha: '2025-04-18', pdf_listo: true },
                { id: '008', nombre: 'Laura Jiménez', cc: '63.907.441', servicio: 'Internet + TV', fecha: '2025-04-22', pdf_listo: true },
                { id: '009', nombre: 'Manuel Castro', cc: '19.543.002', servicio: 'Telefonía + Internet', fecha: '2025-03-05', pdf_listo: true },
                { id: '010', nombre: 'Claudia Ríos', cc: '44.218.763', servicio: 'Internet fijo', fecha: '2025-03-14', pdf_listo: true },
            ]
        };

        /* Formato esperado de cada contrato desde el backend:
        {
          id:       "001",
          nombre:   "Carlos Medina",
          cc:       "12.345.678",
          servicio: "Internet + TV",
          fecha:    "2025-05-15",     // ISO date YYYY-MM-DD
          pdf_listo: true             // boolean — controla si el botón PDF está activo
        }
        
        Formato esperado del asesor:
        {
          nombre:    "Juan Pérez",
          rol:       "Asesor comercial",
          iniciales: "JP"             // opcional, se calcula automáticamente si falta
        }
        */

        /* ════════════════════════════════════════════════════
           ESTADO LOCAL
        ════════════════════════════════════════════════════ */
        let allContracts = [];
        let filtered = [];
        let currentPage = 1;
        const PAGE_SIZE = 10;

        /* ════════════════════════════════════════════════════
           INIT
        ════════════════════════════════════════════════════ */
        document.addEventListener('DOMContentLoaded', () => {
            setTodayDate();
            loadDashboard();
        });

        function setTodayDate() {
            const d = new Date();
            document.getElementById('today-date').textContent =
                d.toLocaleDateString('es-CO', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }

        /* ════════════════════════════════════════════════════
           CARGA DE DATOS
        ════════════════════════════════════════════════════ */
        async function loadDashboard() {
            // Cargar asesor desde sessionStorage (datos del login)
            const sessionUser = JSON.parse(sessionStorage.getItem('user') || 'null');
            if (!sessionUser) {
                window.location.href = 'index.html';
                return;
            }
            const asesor = {
                nombre: sessionUser.name || sessionUser.email || 'Asesor',
                rol: sessionUser.role === 'ADMIN' ? 'Administrador' : 'Asesor comercial',
                iniciales: sessionUser.iniciales || getIniciales(sessionUser.name || sessionUser.email || 'Asesor')
            };
            setAsesor(asesor);

            // Intentar cargar datos del backend; si falla, usar demo
            try {
                const res = await fetch(API.dashboard, { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    setContracts(data.contratos);
                    return;
                }
            } catch (_) { /* backend no disponible, usar demo */ }

            setContracts(DEMO_DATA.contratos);
        }

        /* ════════════════════════════════════════════════════
           RENDER ASESOR
        ════════════════════════════════════════════════════ */
        function setAsesor(a) {
            const ini = a.iniciales || getIniciales(a.nombre);
            document.getElementById('sb-avatar').textContent = ini;
            document.getElementById('topbar-avatar').textContent = ini;
            document.getElementById('sb-name').textContent = a.nombre;
            document.getElementById('sb-role').textContent = a.rol;
        }

        function getIniciales(nombre) {
            return (nombre || '').split(' ').slice(0, 2).map(p => p[0]).join('').toUpperCase();
        }

        /* ════════════════════════════════════════════════════
           RENDER CONTRATOS
        ════════════════════════════════════════════════════ */
        function setContracts(contratos) {
            allContracts = contratos;
            updateStats();
            filtered = [...allContracts];
            currentPage = 1;
            renderTable();
        }

        function updateStats() {
            const now = new Date();
            const mes = now.getMonth();
            const anio = now.getFullYear();

            const total = allContracts.length;
            const esteMes = allContracts.filter(c => {
                const d = new Date(c.fecha);
                return d.getMonth() === mes && d.getFullYear() === anio;
            }).length;
            const conPdf = allContracts.filter(c => c.pdf_listo).length;
            const pending = allContracts.filter(c => !c.pdf_listo).length;

            animateNum('stat-total', total);
            animateNum('stat-month', esteMes);
            animateNum('stat-pdf', conPdf);
            document.getElementById('sb-pending-badge').textContent = pending;
        }

        function animateNum(id, target) {
            const el = document.getElementById(id);
            let current = 0;
            const step = Math.ceil(target / 20) || 1;
            const timer = setInterval(() => {
                current = Math.min(current + step, target);
                el.textContent = current;
                if (current >= target) clearInterval(timer);
            }, 40);
        }

        function filterTable() {
            const q = document.getElementById('search-input').value.toLowerCase().trim();
            filtered = q
                ? allContracts.filter(c =>
                    c.nombre.toLowerCase().includes(q) ||
                    c.cc.replace(/\./g, '').includes(q.replace(/\./g, '')) ||
                    c.servicio.toLowerCase().includes(q)
                )
                : [...allContracts];
            currentPage = 1;
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('contracts-tbody');
            const empty = document.getElementById('empty-state');
            const start = (currentPage - 1) * PAGE_SIZE;
            const page = filtered.slice(start, start + PAGE_SIZE);

            if (filtered.length === 0) {
                tbody.innerHTML = '';
                empty.style.display = 'flex';
            } else {
                empty.style.display = 'none';
                tbody.innerHTML = page.map((c, i) => `
      <tr>
        <td style="color:var(--t3);font-size:12px;font-variant-numeric:tabular-nums">${String(start + i + 1).padStart(3, '0')}</td>
        <td>
          <div class="c-cell">
            <div class="c-av">${getIniciales(c.nombre)}</div>
            <div class="c-name">${esc(c.nombre)}</div>
          </div>
        </td>
        <td style="font-size:12px;color:var(--t2);font-variant-numeric:tabular-nums">${esc(c.cc)}</td>
        <td style="font-size:13px">${esc(c.servicio)}</td>
        <td style="font-size:12px;color:var(--t2)">${formatDate(c.fecha)}</td>
        <td>
          <div class="actions">
            <button class="btn-dl"
              onclick="descargarPDF('${esc(c.id)}','${esc(c.nombre)}')"
              ${!c.pdf_listo ? 'disabled' : ''}>
              <i class="ti ti-download" aria-hidden="true"></i>PDF
            </button>
            <button class="btn-eye" onclick="verContrato('${esc(c.id)}')" title="Ver detalle" aria-label="Ver detalle">
              <i class="ti ti-eye" aria-hidden="true"></i>
            </button>
          </div>
        </td>
      </tr>
    `).join('');
            }

            renderPagination();
        }

        function formatDate(iso) {
            if (!iso) return '—';
            const [y, m, d] = iso.split('-');
            return `${d}/${m}/${y}`;
        }

        function esc(str) {
            return String(str ?? '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        /* ════════════════════════════════════════════════════
           PAGINACIÓN
        ════════════════════════════════════════════════════ */
        function renderPagination() {
            const total = filtered.length;
            const pages = Math.ceil(total / PAGE_SIZE);
            const start = (currentPage - 1) * PAGE_SIZE + 1;
            const end = Math.min(currentPage * PAGE_SIZE, total);

            document.getElementById('page-info').textContent =
                total === 0 ? 'Sin resultados' : `Mostrando ${start}–${end} de ${total}`;

            const btns = document.getElementById('page-btns');
            if (pages <= 1) { btns.innerHTML = ''; return; }

            let html = `<button class="pb" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;
            for (let p = 1; p <= pages; p++) {
                if (pages > 7 && p > 2 && p < pages - 1 && Math.abs(p - currentPage) > 1) {
                    if (p === 3 || p === pages - 2) html += `<button class="pb" disabled>…</button>`;
                    continue;
                }
                html += `<button class="pb ${p === currentPage ? 'cur' : ''}" onclick="goPage(${p})">${p}</button>`;
            }
            html += `<button class="pb" onclick="goPage(${currentPage + 1})" ${currentPage === pages ? 'disabled' : ''}>›</button>`;
            btns.innerHTML = html;
        }

        function goPage(p) {
            const pages = Math.ceil(filtered.length / PAGE_SIZE);
            if (p < 1 || p > pages) return;
            currentPage = p;
            renderTable();
            document.querySelector('.tbl-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        /* ════════════════════════════════════════════════════
           ACCIONES
        ════════════════════════════════════════════════════ */
        async function descargarPDF(id, nombre) {
            try {
                const url = API.pdf.replace('{id}', encodeURIComponent(id));
                const res = await fetch(url, { credentials: 'include' });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const blob = await res.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `contrato-${id}-${nombre.replace(/\s+/g, '-')}.pdf`;
                a.click();
                URL.revokeObjectURL(a.href);
            } catch (err) {
                alert('Error al descargar el PDF: ' + err.message);
            }
        }

        function verContrato(id) {
            // Sin backend, mostramos el formulario del contrato
            window.location.href = 'contrato_internet.html';
        }

        function nuevoContrato() {
            window.location.href = API.nuevo;
        }

        async function logout() {
            try {
                await fetch(API.logout, { method: 'POST', credentials: 'include' });
            } catch (_) { }
            sessionStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        function showError(msg) {
            const empty = document.getElementById('empty-state');
            empty.style.display = 'flex';
            empty.querySelector('p').textContent = msg;
        }

        /* ════════════════════════════════════════════════════
           SIDEBAR TOGGLE (móvil)
        ════════════════════════════════════════════════════ */
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        }
    </script>
</body>

</html>
