<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@sonet — Panel Asesor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --sb: #f4f7fe;
            --sb2: #ffffff;
            --sb3: #ffffff;
            --surf: #f8fafc;
            --b: #1a56db;
            --bd: #1044bb;
            --or: #f04e00;
            --t: #1e293b;
            --t2: #475569;
            --t3: #64748b;
            --bdr: rgba(0, 0, 0, 0.08);
            --gs: #dcfce7;
            --gst: #166534;
            --is: #dbeafe;
            --ist: #1e40af;
            --sidebar-w: 220px;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--sb);
            color: var(--t);
            min-height: 100vh;
            overflow-x: hidden
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--sb2);
            border-right: 1px solid var(--bdr);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 200;
            transition: transform .28s ease
        }

        .logo {
            padding: 10px 10px 10px;
            border-bottom: 1px solid var(--bdr);
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .logo img {
            max-width: 100%;
            height: auto;
            max-height: 80px;
            object-fit: contain;
        }

        .logo span {
            color: var(--or)
        }

        .user-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 18px;
            border-bottom: 1px solid var(--bdr)
        }

        .av {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a56db, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            color: #fff;
            flex-shrink: 0;
            font-family: 'Syne', sans-serif
        }

        .u-name {
            font-size: 13px;
            font-weight: 700
        }

        .u-role {
            font-size: 11px;
            color: var(--t3);
            margin-top: 2px
        }

        .online {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: var(--gst);
            margin-top: 3px
        }

        .dot-g {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #22c55e
        }

        nav {
            flex: 1;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 1px;
            overflow-y: auto
        }

        .ni {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 11px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--t3);
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: .15s
        }

        .ni:hover {
            background: var(--sb3);
            color: var(--t)
        }

        .ni.act {
            background: rgba(26, 86, 219, .10);
            color: var(--b)
        }

        .ni i {
            font-size: 17px;
            width: 20px;
            text-align: center;
            flex-shrink: 0
        }

        .nbadge {
            margin-left: auto;
            font-size: 10px;
            font-weight: 700;
            background: var(--or);
            color: #fff;
            padding: 2px 6px;
            border-radius: 100px
        }

        .sb-bot {
            padding: 10px;
            border-top: 1px solid var(--bdr)
        }

        /* ── OVERLAY MOBILE ── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .55);
            z-index: 199
        }

        .overlay.show {
            display: block
        }

        /* ── MAIN ── */
        .main {
            margin-left: var(--sidebar-w);
            display: flex;
            flex-direction: column;
            min-height: 100vh
        }

        /* ── TOPBAR ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 30px;
            background: var(--sb2);
            border-bottom: 1px solid var(--bdr);
            position: sticky;
            top: 0;
            z-index: 100
        }

        .tb-l {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .hamburger {
            display: none;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            background: var(--sb3);
            border: 1px solid var(--bdr);
            border-radius: 8px;
            cursor: pointer;
            color: var(--t2)
        }

        .hamburger i {
            font-size: 18px
        }

        .tb-title {
            font-family: 'Outfit', sans-serif;
            font-size: 30px;
            font-weight: 800
        }

        .tb-sub {
            font-size: 15px;
            color: var(--t3);
            margin-top: 2px
        }

        .tb-r {
            display: flex;
            align-items: center;
            gap: 8px
        }

        .ib {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: var(--sb3);
            border: 1px solid var(--bdr);
            color: var(--t2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: .15s
        }

        .ib:hover {
            background: var(--surf);
            color: var(--t)
        }

        .ib i {
            font-size: 16px
        }

        .nb {
            position: absolute;
            top: 7px;
            right: 7px;
            width: 6px;
            height: 6px;
            background: var(--or);
            border-radius: 50%;
            border: 2px solid var(--sb2)
        }

        /* ── CONTENT ── */
        .content {
            padding: 24px 28px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px
        }

        /* ── KPIs ── */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px
        }

        .kpi {
            background: var(--sb3);
            border: 1px solid var(--bdr);
            border-radius: 14px;
            padding: 18px 18px 14px;
            overflow: hidden
        }

        .kpi-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px
        }

        .kpi-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .kpi-icon i {
            font-size: 17px
        }

        .ki-b {
            background: var(--is);
            color: var(--ist)
        }

        .ki-g {
            background: var(--gs);
            color: var(--gst)
        }

        .ki-a {
            background: #fef3c7;
            color: #d97706
        }

        .kpi-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 100px
        }

        .kb-flat {
            background: var(--is);
            color: var(--ist)
        }

        .kb-up {
            background: var(--gs);
            color: var(--gst)
        }

        .kpi-num {
            font-family: 'Syne', sans-serif;
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 4px
        }

        .kpi-lbl {
            font-size: 12px;
            color: var(--t3)
        }

        .kpi-spark {
            margin-top: 12px;
            height: 36px;
            opacity: .7;
            display: block;
            width: 100%
        }

        /* ── TABLE CARD ── */
        .tbl-card {
            background: var(--sb3);
            border: 1px solid var(--bdr);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            animation: fadeUp .35s .08s ease both
        }

        .tbl-hd {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--bdr);
            gap: 12px;
            flex-wrap: wrap
        }

        .tbl-title {
            font-size: 14px;
            font-weight: 700
        }

        .tbl-ctrl {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap
        }

        .s-wrap {
            position: relative
        }

        .s-wrap i {
            position: absolute;
            left: 9px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--t3);
            pointer-events: none
        }

        .s-inp {
            background: var(--sb2);
            border: 1px solid var(--bdr);
            border-radius: 8px;
            padding: 7px 10px 7px 30px;
            color: var(--t);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            width: 190px;
            transition: .15s
        }

        .s-inp:focus {
            border-color: var(--b)
        }

        .s-inp::placeholder {
            color: var(--t3)
        }

        .btn-p {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--b);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 7px 14px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: .15s
        }

        .btn-p:hover {
            background: var(--bd)
        }

        .btn-p i {
            font-size: 14px
        }

        .tbl-wrap {
            overflow-x: auto
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 520px
        }

        thead th {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .6px;
            color: var(--t3);
            padding: 10px 18px;
            text-align: left;
            background: var(--surf);
            border-bottom: 1px solid var(--bdr);
            white-space: nowrap
        }

        tbody td {
            padding: 12px 18px;
            font-size: 13px;
            color: var(--t);
            border-bottom: 1px solid var(--bdr);
            vertical-align: middle
        }

        tbody tr:last-child td {
            border-bottom: none
        }

        tbody tr:hover td {
            background: var(--surf)
        }

        .c-cell {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .c-av {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: var(--ist);
            background: var(--is);
            flex-shrink: 0
        }

        .c-name {
            font-size: 13px;
            font-weight: 600
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 6px
        }

        .btn-dl {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--sb2);
            border: 1px solid var(--bdr);
            border-radius: 7px;
            padding: 5px 10px;
            font-family: inherit;
            font-size: 11px;
            font-weight: 600;
            color: var(--t2);
            cursor: pointer;
            transition: .15s
        }

        .btn-dl:hover {
            background: var(--b);
            border-color: var(--b);
            color: #fff
        }

        .btn-dl:disabled {
            opacity: .35;
            cursor: not-allowed
        }

        .btn-dl i {
            font-size: 13px
        }

        .btn-eye {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--sb2);
            border: 1px solid var(--bdr);
            border-radius: 7px;
            cursor: pointer;
            color: var(--t3);
            transition: .15s;
            font-size: 13px
        }

        .btn-eye:hover {
            background: var(--surf);
            color: var(--t)
        }

        /* empty state */
        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 48px 20px;
            color: var(--t3);
            gap: 10px
        }

        .empty-state i {
            font-size: 40px;
            opacity: .4
        }

        .empty-state p {
            font-size: 14px
        }

        /* pagination */
        .pag {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-top: 1px solid var(--bdr);
            flex-wrap: wrap;
            gap: 10px
        }

        .pag-info {
            font-size: 12px;
            color: var(--t3)
        }

        .pag-btns {
            display: flex;
            gap: 5px
        }

        .pb {
            background: var(--sb2);
            border: 1px solid var(--bdr);
            border-radius: 7px;
            padding: 5px 10px;
            font-family: inherit;
            font-size: 12px;
            color: var(--t2);
            cursor: pointer;
            transition: .15s
        }

        .pb:hover:not(:disabled) {
            background: var(--surf);
            color: var(--t)
        }

        .pb.cur {
            background: var(--b);
            border-color: var(--b);
            color: #fff
        }

        .pb:disabled {
            opacity: .35;
            cursor: not-allowed
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .kpi-row {
            animation: fadeUp .35s ease both
        }

        .tbl-card {
            animation: fadeUp .35s .08s ease both
        }

        /* ══════════════════════════════
   RESPONSIVE
══════════════════════════════ */
        @media(max-width:900px) {
            .sidebar {
                transform: translateX(-100%);
                box-shadow: 4px 0 40px rgba(0, 0, 0, .08)
            }

            .sidebar.open {
                transform: translateX(0)
            }

            .main {
                margin-left: 0
            }

            .hamburger {
                display: flex
            }

            .topbar {
                padding: 14px 18px
            }

            .content {
                padding: 18px 16px 24px
            }

            .kpi-row {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px
            }

            .kpi-num {
                font-size: 26px
            }

            .s-inp {
                width: 150px
            }

        }

        @media(max-width:540px) {
            .kpi-row {
                grid-template-columns: 1fr
            }

            .tbl-ctrl {
                width: 100%
            }

            .s-inp {
                width: 100%;
                flex: 1
            }

            .btn-p span {
                display: none
            }
        }

        /* ── MODAL NUEVO CONTRATO ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-card {
            background: #ffffff;
            border-radius: 20px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.8);
            overflow: hidden;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .modal-header {
            padding: 20px 24px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #ffffff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 24px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--t2);
        }

        .form-input {
            height: 42px;
            border: 1px solid var(--bdr);
            border-radius: 8px;
            padding: 0 12px;
            font-family: inherit;
            font-size: 13px;
            color: var(--t);
            background: var(--surf);
            transition: all 0.2s;
        }

        .form-input:focus {
            border-color: var(--b);
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.15);
            outline: none;
        }

        select.form-input {
            cursor: pointer;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--bdr);
            background: #f8fafc;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn-sec {
            padding: 10px 18px;
            border-radius: 8px;
            border: 1px solid var(--bdr);
            background: #ffffff;
            color: var(--t2);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-sec:hover {
            background: var(--surf);
            color: var(--t);
        }

        .btn-save {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: var(--b);
            color: #ffffff;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-save:hover {
            background: var(--bd);
            box-shadow: 0 4px 12px rgba(26, 86, 219, 0.25);
        }

        .btn-trash {
            background: none;
            border: none;
            color: #dc2626;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 4px;
        }

        .btn-trash:hover {
            background: #fef2f2;
            color: #b91c1c;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media(max-width: 540px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>

    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="logo"><img src="logo-sonet-light.png" alt="Asonet Logo"></div>

        <div class="user-pill">
            <div class="av" id="sb-avatar">JP</div>
            <div>
                <div class="u-name" id="sb-name">Cargando...</div>
                <div class="u-role" id="sb-role">Asesor comercial</div>
            </div>
        </div>

        <nav>
            <button class="ni act">
                <i class="ti ti-layout-dashboard" aria-hidden="true"></i>Inicio
            </button>
            <button class="ni" onclick="window.location.href='contrato.html'">
                <i class="ti ti-file-text" aria-hidden="true"></i>Contratos
            </button>
            <button class="ni" onclick="window.location.href='cliente.html'">
                <i class="ti ti-users" aria-hidden="true"></i>Clientes
            </button>
        </nav>

        <div class="sb-bot">
            <button class="ni" onclick="logout()">
                <i class="ti ti-logout" aria-hidden="true"></i>Cerrar sesión
            </button>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="main">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="tb-l">
                <button class="hamburger" onclick="toggleSidebar()" aria-label="Menú">
                    <i class="ti ti-menu-2" aria-hidden="true"></i>
                </button>
                <div>
                    <div class="tb-title" id="tb-welcome">Bienvenido, Asesor</div>
                    <div class="tb-sub" id="today-date"></div>
                </div>
            </div>
            <div class="tb-r">
                <div class="ib" id="topbar-avatar" title="Perfil" style="font-size:12px;font-weight:800;color:#1a56db;font-family:'Syne',sans-serif;">JP</div>
            </div>
        </header>

        <!-- CONTENT -->
        <main class="content">
            <!-- KPIs -->
            <div class="kpi-row">
                <div class="kpi">
                    <div class="kpi-top">
                        <div class="kpi-icon ki-b"><i class="ti ti-files" aria-hidden="true"></i></div>
                        <span class="kpi-badge kb-flat">Total</span>
                    </div>
                    <div class="kpi-num" id="stat-total">0</div>

            <!-- TABLE -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        // Carga inmediata del nombre del asesor desde sessionStorage
        (function () {
            document.addEventListener('DOMContentLoaded', function () {
                var user = null;
                try { user = JSON.parse(sessionStorage.getItem('user') || 'null'); } catch (e) {}
                if (!user) { window.location.href = 'index.html'; return; }
                var name = user.name || 'Asesor';
                var ini = user.iniciales || name.split(' ').slice(0, 2).map(function (p) { return p[0]; }).join('').toUpperCase() || 'U';
                var sbName = document.getElementById('sb-name');
                var sbAv = document.getElementById('sb-avatar');
                var topAv = document.getElementById('topbar-avatar');
                if (sbName) sbName.textContent = name;
                if (sbAv) sbAv.textContent = ini;
                if (topAv) topAv.textContent = ini;
                var welcomeEl = document.getElementById('tb-welcome');
                if (welcomeEl) welcomeEl.textContent = 'Bienvenido, ' + name;
            });
        })();
    </script>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, addDoc, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        // ──────────────────────────────────────────────────────────────
        // CONFIGURACIÓN Y DEMO DATA
        // ──────────────────────────────────────────────────────────────
        const API = {
            dashboard: '/api/dashboard',
            logout: '/api/logout',
            nuevo: 'contrato.html',
        };

        const DEMO_DATA = {
            contratos: [
                { id: '001', nombre: 'Carlos Medina', cc: '12.345.678', servicio: 'Internet + TV', fecha: '2025-05-15', pdf_listo: true },
                { id: '002', nombre: 'María Torres', cc: '98.765.432', servicio: 'Internet fijo', fecha: '2025-05-19', pdf_listo: true },
                { id: '003', nombre: 'Luis Gómez', cc: '45.123.900', servicio: 'Telefonía + Internet', fecha: '2025-05-20', pdf_listo: false },
            ]
        };

        let allContracts = [];
        let filtered = [];
        let currentPage = 1;
        const PAGE_SIZE = 10;

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            setTodayDate();
            loadDashboard();
        });

        function setTodayDate() {
            const d = new Date();
            document.getElementById('today-date').textContent =
                'Asesor Comercial · ' + d.toLocaleDateString('es-CO', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }

        async function loadDashboard() {
            const sessionUser = JSON.parse(sessionStorage.getItem('user') || 'null');
            if (!sessionUser) {
                window.location.href = 'index.html';
                return;
            }
            const asesor = {
                nombre: sessionUser.name || 'Asesor',
                iniciales: sessionUser.iniciales || getIniciales(sessionUser.name || 'Asesor')
            };
            setAsesor(asesor);

            try {
                // Conectar con Firestore en lugar del backend REST
                const qSnap = await getDocs(collection(db, 'contratos'));
                const contratos = [];
                qSnap.forEach(docSnap => {
                    contratos.push({ id: docSnap.id, ...docSnap.data() });
                });
                setContracts(contratos);
                localStorage.setItem('sonet_contratos', JSON.stringify(contratos));
                return;
            } catch (err) {
                console.error("Firestore loading error. Using localStorage backup:", err);
            }

            const savedContratos = localStorage.getItem('sonet_contratos');
            if (savedContratos) {
                setContracts(JSON.parse(savedContratos));
            } else {
                setContracts(DEMO_DATA.contratos);
                localStorage.setItem('sonet_contratos', JSON.stringify(DEMO_DATA.contratos));
            }
        }

        function setAsesor(a) {
            const ini = a.iniciales || getIniciales(a.nombre);
            document.getElementById('sb-avatar').textContent = ini;
            document.getElementById('topbar-avatar').textContent = ini;
            document.getElementById('sb-name').textContent = a.nombre;
        }

        function getIniciales(nombre) {
            return (nombre || '').split(' ').slice(0, 2).map(p => p[0]).join('').toUpperCase();
        }

        function setContracts(contratos) {
            allContracts = contratos;
            updateStats();
            filtered = [...allContracts];
            currentPage = 1;
            renderTable();
        }

        function updateStats() {
            const now = new Date();
            const mes = now.getMonth();
            const anio = now.getFullYear();
            const total = allContracts.length;
            const esteMes = allContracts.filter(c => {
                const d = new Date(c.fecha);
                return d.getMonth() === mes && d.getFullYear() === anio;
            }).length;
            const conPdf = allContracts.filter(c => c.pdf_listo).length;
            const pending = allContracts.filter(c => !c.pdf_listo).length;

            animateNum('stat-total', total);
            animateNum('stat-month', esteMes);
            animateNum('stat-pdf', conPdf);
            const badgeEl = document.getElementById('sb-pending-badge');
            if (badgeEl) badgeEl.textContent = pending;
        }

        function animateNum(id, target) {
            const el = document.getElementById(id);
            if (!el) return;
            let current = 0;
            const step = Math.ceil(target / 20) || 1;
            const timer = setInterval(() => {
                current = Math.min(current + step, target);
                el.textContent = current;
                if (current >= target) clearInterval(timer);
            }, 40);
        }

        function filterTable() {
            const q = document.getElementById('search-input').value.toLowerCase().trim();
            filtered = q
                ? allContracts.filter(c =>
                    c.nombre.toLowerCase().includes(q) ||
                    c.cc.replace(/\./g, '').includes(q.replace(/\./g, '')) ||
                    c.servicio.toLowerCase().includes(q)
                )
                : [...allContracts];
            currentPage = 1;
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('contracts-tbody');
            const empty = document.getElementById('empty-state');
            const start = (currentPage - 1) * PAGE_SIZE;
            const page = filtered.slice(start, start + PAGE_SIZE);

            if (filtered.length === 0) {
                tbody.innerHTML = '';
                empty.style.display = 'flex';
            } else {
                empty.style.display = 'none';
                tbody.innerHTML = page.map((c, i) => `
          <tr>
            <td style="color:var(--t3);font-size:12px">${String(start + i + 1).padStart(3, '0')}</td>
            <td>
              <div class="c-cell">
                <div class="c-av">${getIniciales(c.nombre)}</div>
                <div class="c-name">${esc(c.nombre)}</div>
              </div>
            </td>
            <td style="font-size:12px;color:var(--t2)">${esc(c.cc)}</td>
            <td style="font-size:13px">${esc(c.servicio)}</td>
            <td style="font-size:12px;color:var(--t2)">${formatDate(c.fecha)}</td>
            <td>
              <div class="actions">
                <button class="btn-dl" onclick="descargarPDFContrato('${esc(c.id)}','${esc(c.nombre)}','${esc(c.cc)}','${esc(c.servicio)}')">
                  <i class="ti ti-download" aria-hidden="true"></i>PDF
                </button>
                <button class="btn-eye" onclick="verContrato('${esc(c.id)}')">
                  <i class="ti ti-eye" aria-hidden="true"></i>
                </button>
                <button class="btn-trash" onclick="eliminarContrato('${esc(c.id)}')">
                  <i class="ti ti-trash" aria-hidden="true"></i>
                </button>
              </div>
            </td>
          </tr>
        `).join('');
            }
            renderPagination();
        }

        function formatDate(iso) {
            if (!iso) return '—';
            const [y, m, d] = iso.split('-');
            return `${d}/${m}/${y}`;
        }

        function esc(str) {
            return String(str ?? '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function renderPagination() {
            const total = filtered.length;
            const pages = Math.ceil(total / PAGE_SIZE);
            const start = (currentPage - 1) * PAGE_SIZE + 1;
            const end = Math.min(currentPage * PAGE_SIZE, total);

            document.getElementById('page-info').textContent =
                total === 0 ? 'Sin resultados' : `Mostrando ${start}–${end} de ${total}`;

            const btns = document.getElementById('page-btns');
            if (pages <= 1) { btns.innerHTML = ''; return; }

            let html = `<button class="pb" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;
            for (let p = 1; p <= pages; p++) {
                if (pages > 7 && p > 2 && p < pages - 1 && Math.abs(p - currentPage) > 1) {
                    if (p === 3 || p === pages - 2) html += `<button class="pb" disabled>…</button>`;
                    continue;
                }
                html += `<button class="pb ${p === currentPage ? 'cur' : ''}" onclick="goPage(${p})">${p}</button>`;
            }
            html += `<button class="pb" onclick="goPage(${currentPage + 1})" ${currentPage === pages ? 'disabled' : ''}>›</button>`;
            btns.innerHTML = html;
        }

        function goPage(p) {
            const pages = Math.ceil(filtered.length / PAGE_SIZE);
            if (p < 1 || p > pages) return;
            currentPage = p;
            renderTable();
            document.querySelector('.tbl-card').scrollIntoView({ behavior: 'smooth' });
        }

        // ──────────────────────────────────────────────────────────────
        // FUNCIÓN DE DESCARGA DE PDF CON DATOS RELLENADOS
        // ──────────────────────────────────────────────────────────────
        function descargarPDFContrato(id, nombre, cc, servicio) {
            try {
                const localData = JSON.parse(localStorage.getItem('sonet_contratos') || '[]');
                const savedItem = localData.find(c => c.id === id) || {};

                const datosContrato = {
                    id: id,
                    numeroContrato: id,
                    nombre: nombre,
                    identificacion: cc,
                    cc: cc,
                    servicio: servicio,
                    valorMensual: savedItem.valorMensual || '40.000',
                    mesesVigencia: savedItem.mesesVigencia || '12',
                    fechaInicio: savedItem.fecha ? formatDate(savedItem.fecha) : new Date().toLocaleDateString('es-CO'),
                    renovacionAuto: true,
                    servicios: {
                        internetFijo: servicio.toLowerCase().includes('internet'),
                        telefoniaFija: servicio.toLowerCase().includes('telefonía') || servicio.toLowerCase().includes('telefonia'),
                        television: servicio.toLowerCase().includes('tv') || servicio.toLowerCase().includes('televisión')
                    },
                    fechaActivacion: new Date(Date.now() + 15 * 24 * 60 * 60 * 1000).toLocaleDateString('es-CO'),
                    diaCorte: '15',
                    departamento: savedItem.departamento || 'Huila',
                    municipio: savedItem.municipio || 'Garzón',
                    estrato: savedItem.estrato || '3',
                    email: savedItem.email || 'cliente@example.com',
                    telefono: savedItem.telefono || '(+57) 8330560',
                    permanenciaMinima: false,
                    asesor: JSON.parse(sessionStorage.getItem('user') || '{}').name || 'Asesor'
                };

                if (typeof generarPDFContrato === 'function') {
                    generarPDFContrato(datosContrato);
                } else {
                    alert('Error: El generador de PDF no está disponible.');
                }
            } catch (err) {
                console.error('Error:', err);
                alert('Error al generar el PDF: ' + err.message);
            }
        }

        // ──────────────────────────────────────────────────────────────
        // FUNCIONALIDADES DE FIREBASE FIRESTORE (GUARDAR Y ELIMINAR)
        // ──────────────────────────────────────────────────────────────
        function nuevoContrato() {
            document.getElementById('new-contract-form').reset();
            document.getElementById('new-contract-modal').classList.add('show');
        }

        function closeNewContractModal() {
            document.getElementById('new-contract-modal').classList.remove('show');
        }

        async function guardarNuevoContrato() {
            const nombre = document.getElementById('nc-nombre').value.trim();
            const cc = document.getElementById('nc-cc').value.trim();
            const servicio = document.getElementById('nc-servicio').value;
            const valorMensual = document.getElementById('nc-valor').value.trim();
            const estrato = document.getElementById('nc-estrato').value;
            const telefono = document.getElementById('nc-telefono').value.trim();
            const email = document.getElementById('nc-email').value.trim();
            const municipio = document.getElementById('nc-municipio').value.trim();
            const departamento = document.getElementById('nc-departamento').value.trim();

            if (!nombre || !cc) {
                alert('Por favor complete los campos obligatorios.');
                return;
            }

            const nuevoItem = {
                nombre: nombre,
                cc: cc,
                servicio: servicio,
                fecha: new Date().toISOString().split('T')[0],
                pdf_listo: true,
                valorMensual: valorMensual,
                estrato: estrato,
                telefono: telefono,
                email: email,
                municipio: municipio,
                departamento: departamento,
                mesesVigencia: '12',
                asesor: JSON.parse(sessionStorage.getItem('user') || '{}').name || 'Asesor'
            };

            try {
                // Guardar en Firestore
                const docRef = await addDoc(collection(db, 'contratos'), nuevoItem);
                nuevoItem.id = docRef.id;

                allContracts.unshift(nuevoItem);
                localStorage.setItem('sonet_contratos', JSON.stringify(allContracts));
                
                closeNewContractModal();
                setContracts(allContracts);

                // Descargar el PDF automáticamente
                setTimeout(() => {
                    descargarPDFContrato(nuevoItem.id, nuevoItem.nombre, nuevoItem.cc, nuevoItem.servicio);
                }, 300);
            } catch (err) {
                console.error('Error saving to Firebase:', err);
                alert('Error al guardar en Firebase: ' + err.message);
            }
        }

        async function eliminarContrato(id) {
            if (confirm('¿Está seguro de que desea eliminar este contrato?')) {
                try {
                    // Eliminar de Firestore
                    await deleteDoc(doc(db, 'contratos', id));
                    
                    allContracts = allContracts.filter(c => c.id !== id);
                    localStorage.setItem('sonet_contratos', JSON.stringify(allContracts));
                    setContracts(allContracts);
                } catch (err) {
                    console.error('Error deleting from Firebase:', err);
                    alert('Error al eliminar de Firebase: ' + err.message);
                }
            }
        }

        function verContrato(id) {
            const contrato = allContracts.find(c => c.id === id);
            if (contrato) sessionStorage.setItem('contrato_ver', JSON.stringify(contrato));
            window.location.href = 'contrato_internet.html';
        }

        async function logout() {
            try {
                await fetch(API.logout, { method: 'POST', credentials: 'include' });
            } catch (_) { }
            sessionStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        }

        // BINDING DE FUNCIONES AL OBJETO WINDOW (Necesario por el uso de type="module")
        window.nuevoContrato = nuevoContrato;
        window.closeNewContractModal = closeNewContractModal;
        window.guardarNuevoContrato = guardarNuevoContrato;
        window.eliminarContrato = eliminarContrato;
        window.descargarPDFContrato = descargarPDFContrato;
        window.verContrato = verContrato;
        window.logout = logout;
        window.toggleSidebar = toggleSidebar;
        window.closeSidebar = closeSidebar;
        window.goPage = goPage;
        window.filterTable = filterTable;
    </script>
